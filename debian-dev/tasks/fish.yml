---
- name: Ensure fish is listed in /etc/shells
  become: true
  ansible.builtin.lineinfile:
    path: /etc/shells
    line: "{{ fish_path }}"
    state: present

- name: Set fish as dev's default shell
  become: true
  ansible.builtin.user:
    name: "{{ debian_dev_user }}"
    shell: "{{ fish_path }}"

# get.oh-my.fish's redirector is unreachable from this network ("No
# route to host" upstream of this VM, unrelated to DNS/IPv6), so fetch
# the installer straight from GitHub instead, which is reachable. `set
# -e` plus `curl -f` make a failed download abort the script instead of
# silently running fish against an empty file and reporting success.
- name: Install oh-my-fish
  ansible.builtin.shell:
    cmd: |
      set -e
      curl -fsSL https://raw.githubusercontent.com/oh-my-fish/oh-my-fish/master/bin/install > /tmp/omf-install.fish
      fish /tmp/omf-install.fish --noninteractive
    creates: "/home/{{ debian_dev_user }}/.local/share/omf"

- name: Update oh-my-fish
  ansible.builtin.command:
    cmd: fish -c "omf update"
  changed_when: true
  # omf pulls itself and its packages from git; a transient network failure
  # shouldn't abort provisioning.
  failed_when: false
