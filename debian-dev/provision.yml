---
- name: Provision debian dev
  hosts: debian_dev
  gather_facts: true
  vars_prompt:
    - name: machine_ip
      prompt: "Machine IP address"
      private: false
    - name: ansible_become_password
      prompt: "Sudo password for {{ debian_dev_user | default('dev') }}"
      private: true
  tasks:
    # Bootstrap just added dev to the sudo group. The persistent SSH session
    # from the bootstrap play predates that change and lacks the group, so
    # reconnect to pick up fresh group membership before any sudo task.
    - name: Reset SSH connection so new sudo group membership takes effect
      ansible.builtin.meta: reset_connection

    - import_tasks: tasks/ssh_keys.yml
    - import_tasks: tasks/ssh_hardening.yml
    - import_tasks: tasks/firewall.yml
    - import_tasks: tasks/apt_packages.yml
    - import_tasks: tasks/unattended_upgrades.yml
    - import_tasks: tasks/golang.yml
    - import_tasks: tasks/github_tools.yml
    - import_tasks: tasks/github_cli.yml
    - import_tasks: tasks/docker.yml
    - import_tasks: tasks/fish.yml
    - import_tasks: tasks/task_runner.yml
    - import_tasks: tasks/python_tools.yml
    - import_tasks: tasks/rust.yml
    - import_tasks: tasks/terminfo.yml
    - import_tasks: tasks/dev_ssh_key.yml
    - import_tasks: tasks/node.yml
    - import_tasks: tasks/dotfiles.yml

  handlers:
    - import_tasks: handlers/restart_ssh.yml
