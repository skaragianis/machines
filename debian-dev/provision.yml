---
- name: Provision debian dev
  hosts: debian_dev
  gather_facts: true
  vars_prompt:
    - name: machine_ip
      prompt: "Machine IP address"
      private: false
    - name: ansible_become_password
      prompt: "Sudo password for {{ debian_dev_user | default('dev') }}"
      private: true
  tasks:
    # Bootstrap just added dev to the sudo group. The persistent SSH session
    # from the bootstrap play predates that change and lacks the group, so
    # reconnect to pick up fresh group membership before any sudo task.
    - name: Reset SSH connection so new sudo group membership takes effect
      ansible.builtin.meta: reset_connection

    # --- Privileged (sudo) ---
    - name: Install apt packages
      become: true
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present
        update_cache: true

    # Debian ships fd-find's binary as fdfind (fd is taken by an unrelated
    # package), so symlink it to the expected name.
    - name: Symlink fdfind to fd
      become: true
      ansible.builtin.file:
        src: /usr/bin/fdfind
        dest: /usr/local/bin/fd
        state: link
        force: true

    # Debian's apt package lags upstream releases, so install the latest
    # stable Neovim straight from GitHub instead. The "stable" tag is
    # continuously repointed at the current release. force:true re-fetches
    # it every run but only reports changed (Neovim publishes no per-asset
    # checksum file to check against instead) when the content actually
    # differs from what's already on disk, so extraction only runs on
    # real updates.
    - name: Determine Neovim release architecture
      ansible.builtin.set_fact:
        nvim_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'x86_64' }}"

    - name: Download latest stable Neovim release
      become: true
      ansible.builtin.get_url:
        url: "https://github.com/neovim/neovim/releases/download/stable/nvim-linux-{{ nvim_arch }}.tar.gz"
        dest: "/opt/nvim-linux-{{ nvim_arch }}.tar.gz"
        force: true
      register: nvim_download

    - name: Extract Neovim release
      become: true
      ansible.builtin.unarchive:
        src: "/opt/nvim-linux-{{ nvim_arch }}.tar.gz"
        dest: /opt/
        remote_src: true
      when: nvim_download.changed

    - name: Symlink nvim into /usr/local/bin
      become: true
      ansible.builtin.file:
        src: "/opt/nvim-linux-{{ nvim_arch }}/bin/nvim"
        dest: /usr/local/bin/nvim
        state: link
        force: true

    # Same rationale as Neovim above: pull the latest release straight from
    # GitHub rather than relying on Debian's apt package. The "latest"
    # redirect always points at the newest tag, so force:true re-fetches it
    # every run but only reports changed when the content actually differs.
    - name: Determine yazi release architecture
      ansible.builtin.set_fact:
        yazi_arch: "{{ 'aarch64' if ansible_facts['architecture'] == 'aarch64' else 'x86_64' }}"

    - name: Download latest yazi release
      become: true
      ansible.builtin.get_url:
        url: "https://github.com/sxyazi/yazi/releases/latest/download/yazi-{{ yazi_arch }}-unknown-linux-gnu.zip"
        dest: "/opt/yazi-{{ yazi_arch }}-unknown-linux-gnu.zip"
        force: true
      register: yazi_download

    - name: Extract yazi release
      become: true
      ansible.builtin.unarchive:
        src: "/opt/yazi-{{ yazi_arch }}-unknown-linux-gnu.zip"
        dest: /opt/
        remote_src: true
      when: yazi_download.changed

    - name: Symlink yazi and ya into /usr/local/bin
      become: true
      ansible.builtin.file:
        src: "/opt/yazi-{{ yazi_arch }}-unknown-linux-gnu/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        state: link
        force: true
      loop:
        - yazi
        - ya

    - name: Download GitHub CLI apt keyring
      become: true
      ansible.builtin.shell:
        cmd: "curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg"
        creates: /usr/share/keyrings/githubcli-archive-keyring.gpg

    - name: Set permissions on GitHub CLI keyring
      become: true
      ansible.builtin.file:
        path: /usr/share/keyrings/githubcli-archive-keyring.gpg
        mode: "0644"

    - name: Add GitHub CLI apt repository
      become: true
      ansible.builtin.deb822_repository:
        name: github-cli
        types: deb
        uris: https://cli.github.com/packages
        suites: stable
        components: main
        architectures: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }}"
        signed_by: /usr/share/keyrings/githubcli-archive-keyring.gpg
        state: present

    - name: Install gh
      become: true
      ansible.builtin.apt:
        name: gh
        state: present
        update_cache: true

    - name: Add dev to the docker group
      become: true
      ansible.builtin.user:
        name: "{{ debian_dev_user }}"
        groups: docker
        append: true

    - name: Ensure fish is listed in /etc/shells
      become: true
      ansible.builtin.lineinfile:
        path: /etc/shells
        line: "{{ fish_path }}"
        state: present

    - name: Set fish as dev's default shell
      become: true
      ansible.builtin.user:
        name: "{{ debian_dev_user }}"
        shell: "{{ fish_path }}"

    - name: Install oh-my-fish
      ansible.builtin.shell:
        cmd: "curl -L https://get.oh-my.fish | fish"
        creates: "/home/{{ debian_dev_user }}/.local/share/omf"

    - name: Install Task (taskfile.dev) to /usr/local/bin
      become: true
      ansible.builtin.shell:
        cmd: "curl -fsSL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin"
        creates: /usr/local/bin/task

    - name: Install uv (astral.sh)
      ansible.builtin.shell:
        cmd: "curl -LsSf https://astral.sh/uv/install.sh | sh"
        creates: "/home/{{ debian_dev_user }}/.local/bin/uv"

    - name: Install ruff (astral.sh)
      ansible.builtin.shell:
        cmd: "curl -LsSf https://astral.sh/ruff/install.sh | sh"
        creates: "/home/{{ debian_dev_user }}/.local/bin/ruff"

    # --- Ghostty terminfo (generate on Mac, load on VM) ---
    - name: Generate ghostty terminfo on the control node
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: infocmp -x xterm-ghostty
      register: ghostty_terminfo
      changed_when: false

    - name: Copy ghostty terminfo to the VM
      ansible.builtin.copy:
        content: "{{ ghostty_terminfo.stdout }}\n"
        dest: "/home/{{ debian_dev_user }}/ghostty.terminfo"
        owner: "{{ debian_dev_user }}"
        group: "{{ debian_dev_user }}"
        mode: "0644"

    - name: Check whether ghostty terminfo is already known
      ansible.builtin.command:
        cmd: infocmp xterm-ghostty
      register: ghostty_check
      changed_when: false
      failed_when: false

    - name: Load ghostty terminfo
      ansible.builtin.command:
        cmd: "tic -x /home/{{ debian_dev_user }}/ghostty.terminfo"
      when: ghostty_check.rc != 0
      changed_when: true

    - name: Ensure dev's .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ debian_dev_user }}/.ssh"
        state: directory
        mode: "0700"

    - name: Generate GitHub SSH keypair for dev
      community.crypto.openssh_keypair:
        path: "/home/{{ debian_dev_user }}/.ssh/id_ed25519"
        type: ed25519
        comment: "{{ github_key_comment }}"

    - name: Read the GitHub public key
      ansible.builtin.slurp:
        src: "/home/{{ debian_dev_user }}/.ssh/id_ed25519.pub"
      register: github_pubkey

    - name: Show GitHub public key (add it at github.com/settings/keys)
      ansible.builtin.debug:
        msg: "{{ github_pubkey.content | b64decode }}"

    - name: Check whether fnm is installed
      ansible.builtin.stat:
        path: "/home/{{ debian_dev_user }}/.local/share/fnm/fnm"
      register: fnm_bin

    - name: Install fnm
      ansible.builtin.shell:
        cmd: "curl -fsSL https://fnm.vercel.app/install | bash"
        executable: /bin/bash
      when: not fnm_bin.stat.exists
      changed_when: true

    - name: List installed Node versions
      ansible.builtin.shell:
        cmd: |
          export PATH="$HOME/.local/share/fnm:$PATH"
          fnm list
        executable: /bin/bash
      register: fnm_list
      changed_when: false

    - name: Install Node LTS and set it as default
      ansible.builtin.shell:
        cmd: |
          export PATH="$HOME/.local/share/fnm:$PATH"
          eval "$(fnm env)"
          fnm install --lts
          fnm default lts-latest
        executable: /bin/bash
      when: "'lts' not in (fnm_list.stdout | lower)"
      changed_when: true

    - name: Check whether claude-code is installed
      ansible.builtin.shell:
        cmd: |
          export PATH="$HOME/.local/share/fnm:$PATH"
          eval "$(fnm env)"
          which claude
        executable: /bin/bash
      register: claude_check
      changed_when: false
      failed_when: false

    - name: Configure npm allow-scripts for claude-code
      ansible.builtin.shell:
        cmd: |
          export PATH="$HOME/.local/share/fnm:$PATH"
          eval "$(fnm env)"
          npm config set allow-scripts=@anthropic-ai/claude-code --location=user
        executable: /bin/bash
      when: claude_check.rc != 0
      changed_when: true

    - name: Install claude-code globally
      ansible.builtin.shell:
        cmd: |
          export PATH="$HOME/.local/share/fnm:$PATH"
          eval "$(fnm env)"
          npm install -g @anthropic-ai/claude-code
        executable: /bin/bash
      when: claude_check.rc != 0
      changed_when: true

    - name: Check whether codex is installed
      ansible.builtin.shell:
        cmd: |
          export PATH="$HOME/.local/share/fnm:$PATH"
          eval "$(fnm env)"
          which codex
        executable: /bin/bash
      register: codex_check
      changed_when: false
      failed_when: false

    - name: Install codex globally
      ansible.builtin.shell:
        cmd: |
          export PATH="$HOME/.local/share/fnm:$PATH"
          eval "$(fnm env)"
          npm install -g @openai/codex
        executable: /bin/bash
      when: codex_check.rc != 0
      changed_when: true

    - name: Write dev's global git config
      ansible.builtin.copy:
        dest: "/home/{{ debian_dev_user }}/.gitconfig"
        owner: "{{ debian_dev_user }}"
        group: "{{ debian_dev_user }}"
        mode: "0644"
        content: |
          [user]
          	name = {{ git_user_name }}
          	email = {{ git_user_email }}
          [init]
          	defaultBranch = {{ git_default_branch }}
          [core]
            editor = {{ git_default_editor }}

    - name: Add github.com to dev's known_hosts
      ansible.builtin.known_hosts:
        name: github.com
        key: "{{ lookup('ansible.builtin.pipe', 'ssh-keyscan -t ed25519 github.com') }}"
        path: "/home/{{ debian_dev_user }}/.ssh/known_hosts"

    - name: Install chezmoi to /usr/local/bin
      become: true
      ansible.builtin.shell:
        cmd: "sh -c \"$(curl -fsLS get.chezmoi.io)\" -- -b /usr/local/bin"
        creates: /usr/local/bin/chezmoi

    - name: Initialize and apply dotfiles with chezmoi
      ansible.builtin.command:
        cmd: "chezmoi init --apply {{ dotfiles_repo }}"
        # Check .git, not the source dir itself: a failed clone (e.g. the
        # deploy key not on GitHub yet) still leaves the empty source dir
        # behind, which previously made `creates` skip every re-run forever.
        creates: "/home/{{ debian_dev_user }}/.local/share/chezmoi/.git"

    - name: Remaining manual steps
      ansible.builtin.debug:
        msg:
          - "1. Add the SSH public key printed above to https://github.com/settings/keys"
          - "2. If the chezmoi step above failed because that key wasn't added to GitHub yet, add it and re-run provision.yml"
