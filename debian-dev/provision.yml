---
- name: Provision debian dev
  hosts: debian_dev
  gather_facts: true
  vars_prompt:
    - name: machine_ip
      prompt: "Machine IP address"
      private: false
    - name: ansible_become_password
      prompt: "Sudo password for {{ debian_dev_user | default('dev') }}"
      private: true
  tasks:
    # Bootstrap just added dev to the sudo group. The persistent SSH session
    # from the bootstrap play predates that change and lacks the group, so
    # reconnect to pick up fresh group membership before any sudo task.
    - name: Reset SSH connection so new sudo group membership takes effect
      ansible.builtin.meta: reset_connection

    # Runs first so that a play failing further down still leaves every
    # authorized key in place. exclusive: true makes dev_authorized_keys the
    # source of truth — a key added by hand on the host is removed here.
    - name: Install authorized keys for dev
      ansible.posix.authorized_key:
        user: "{{ debian_dev_user }}"
        key: "{{ dev_authorized_keys | join('\n') }}"
        exclusive: true

    # --- Privileged (sudo) ---
    # state: latest so every run upgrades these to the newest version apt
    # offers, rather than leaving whatever first landed pinned.
    - name: Install apt packages
      become: true
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: latest
        update_cache: true

    # Debian's golang-go lags well behind upstream, so install the latest Go
    # toolchain straight from go.dev. go.dev/VERSION returns the newest release
    # (e.g. "go1.25.1") on its first line; we reinstall only when that differs
    # from what's on disk.
    - name: Determine Go release architecture
      ansible.builtin.set_fact:
        go_arch: "{{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}"

    - name: Resolve latest Go version
      ansible.builtin.uri:
        url: https://go.dev/VERSION?m=text
        return_content: true
      register: go_latest

    - name: Extract Go version string
      ansible.builtin.set_fact:
        go_version: "{{ go_latest.content.split('\n')[0] | trim }}"

    - name: Check installed Go version
      ansible.builtin.command: /usr/local/go/bin/go version
      register: go_installed
      changed_when: false
      failed_when: false

    - name: Download latest Go tarball
      become: true
      ansible.builtin.get_url:
        url: "https://go.dev/dl/{{ go_version }}.linux-{{ go_arch }}.tar.gz"
        dest: "/opt/{{ go_version }}.linux-{{ go_arch }}.tar.gz"
        mode: "0644"
        force: true
      when: go_version not in go_installed.stdout
      register: go_download

    # Per go.dev's install docs: wipe the old tree before extracting so removed
    # files don't linger across upgrades.
    - name: Remove previous Go installation
      become: true
      ansible.builtin.file:
        path: /usr/local/go
        state: absent
      when: go_download.changed

    - name: Extract Go to /usr/local
      become: true
      ansible.builtin.unarchive:
        src: "/opt/{{ go_version }}.linux-{{ go_arch }}.tar.gz"
        dest: /usr/local
        remote_src: true
      when: go_download.changed

    - name: Symlink go and gofmt into /usr/local/bin
      become: true
      ansible.builtin.file:
        src: "/usr/local/go/bin/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        state: link
        force: true
      loop:
        - go
        - gofmt

    # neovim, yazi, fzf, lazygit, ripgrep, fd, zoxide, jq, hunk: each pulled from
    # a GitHub release (latest, or a pinned tag). See github_release_tools in
    # group_vars and the shared task file.
    - name: Install latest GitHub-release CLI tools
      ansible.builtin.include_tasks: tasks/install_github_binary.yml
      loop: "{{ github_release_tools }}"
      loop_control:
        loop_var: tool
        label: "{{ tool.name }}"

    - name: Download GitHub CLI apt keyring
      become: true
      ansible.builtin.shell:
        cmd: "curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg"
        creates: /usr/share/keyrings/githubcli-archive-keyring.gpg

    - name: Set permissions on GitHub CLI keyring
      become: true
      ansible.builtin.file:
        path: /usr/share/keyrings/githubcli-archive-keyring.gpg
        mode: "0644"

    - name: Add GitHub CLI apt repository
      become: true
      ansible.builtin.deb822_repository:
        name: github-cli
        types: deb
        uris: https://cli.github.com/packages
        suites: stable
        components: main
        architectures: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }}"
        signed_by: /usr/share/keyrings/githubcli-archive-keyring.gpg
        state: present

    - name: Install gh
      become: true
      ansible.builtin.apt:
        name: gh
        state: latest
        update_cache: true

    # Debian's docker.io / docker-compose (v1) trail upstream and compose v1 is
    # end-of-life, so install Docker Engine + Compose v2 from Docker's own apt
    # repo. Purge the distro packages first so the two don't fight over the
    # docker binary.
    # docker-buildx and docker-compose-v2 are standalone Debian packages whose
    # files (e.g. /usr/libexec/docker/cli-plugins/docker-buildx) collide with
    # Docker's -plugin packages, so they must be purged too, not just docker.io.
    - name: Remove distro Docker packages superseded by the official repo
      become: true
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
          - docker-compose-v2
          - docker-buildx
          - docker-doc
          - podman-docker
          - containerd
          - runc
        state: absent

    - name: Ensure /etc/apt/keyrings exists
      become: true
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker apt keyring
      become: true
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      become: true
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: https://download.docker.com/linux/debian
        suites: "{{ ansible_facts['distribution_release'] }}"
        components: stable
        architectures: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
        signed_by: /etc/apt/keyrings/docker.asc
        state: present

    - name: Install Docker Engine and Compose plugin
      become: true
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest
        update_cache: true

    - name: Add dev to the docker group
      become: true
      ansible.builtin.user:
        name: "{{ debian_dev_user }}"
        groups: docker
        append: true

    - name: Ensure fish is listed in /etc/shells
      become: true
      ansible.builtin.lineinfile:
        path: /etc/shells
        line: "{{ fish_path }}"
        state: present

    - name: Set fish as dev's default shell
      become: true
      ansible.builtin.user:
        name: "{{ debian_dev_user }}"
        shell: "{{ fish_path }}"

    # get.oh-my.fish's redirector is unreachable from this network ("No
    # route to host" upstream of this VM, unrelated to DNS/IPv6), so fetch
    # the installer straight from GitHub instead, which is reachable. `set
    # -e` plus `curl -f` make a failed download abort the script instead of
    # silently running fish against an empty file and reporting success.
    - name: Install oh-my-fish
      ansible.builtin.shell:
        cmd: |
          set -e
          curl -fsSL https://raw.githubusercontent.com/oh-my-fish/oh-my-fish/master/bin/install > /tmp/omf-install.fish
          fish /tmp/omf-install.fish --noninteractive
        creates: "/home/{{ debian_dev_user }}/.local/share/omf"

    - name: Update oh-my-fish
      ansible.builtin.command:
        cmd: fish -c "omf update"
      changed_when: true
      # omf pulls itself and its packages from git; a transient network failure
      # shouldn't abort provisioning.
      failed_when: false

    # These installer-script / package-manager tools have no cheap "am I already
    # on latest?" check, so they re-run every play (dropping the old install-once
    # `creates:` guards) to pull the newest release, and report changed each time.
    - name: Install/upgrade Task (taskfile.dev) to /usr/local/bin
      become: true
      ansible.builtin.shell:
        cmd: "curl -fsSL https://taskfile.dev/install.sh | sh -s -- -b /usr/local/bin"
      changed_when: true

    - name: Install/upgrade uv (astral.sh)
      ansible.builtin.shell:
        cmd: "curl -LsSf https://astral.sh/uv/install.sh | sh"
      changed_when: true

    - name: Install/upgrade uv-managed tools to latest
      ansible.builtin.command:
        cmd: "/home/{{ debian_dev_user }}/.local/bin/uv tool install --force --reinstall {{ item }}@latest"
      loop:
        - ruff
        - ty
      changed_when: true

    # --no-modify-path: dev's shell is fish (managed via chezmoi in the
    # dotfiles repo), which doesn't read the .profile/.bashrc rustup would
    # otherwise edit, so skip that and let dotfiles own PATH.
    - name: Install rustup (cargo, rustc)
      ansible.builtin.shell:
        cmd: "curl https://sh.rustup.rs | sh -s -- -y --no-modify-path"
        creates: "/home/{{ debian_dev_user }}/.cargo/bin/cargo"

    # rustup update tracks the latest stable toolchain (and updates rustup
    # itself) on every run; changed only when it actually moves something.
    - name: Update Rust toolchain to latest stable
      ansible.builtin.command:
        cmd: "/home/{{ debian_dev_user }}/.cargo/bin/rustup update stable"
      register: rustup_update
      changed_when: "'unchanged' not in rustup_update.stdout"

    # --- Ghostty terminfo (generate on Mac, load on VM) ---
    - name: Generate ghostty terminfo on the control node
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: infocmp -x xterm-ghostty
      register: ghostty_terminfo
      changed_when: false

    - name: Copy ghostty terminfo to the VM
      ansible.builtin.copy:
        content: "{{ ghostty_terminfo.stdout }}\n"
        dest: "/home/{{ debian_dev_user }}/ghostty.terminfo"
        owner: "{{ debian_dev_user }}"
        group: "{{ debian_dev_user }}"
        mode: "0644"

    - name: Check whether ghostty terminfo is already known
      ansible.builtin.command:
        cmd: infocmp xterm-ghostty
      register: ghostty_check
      changed_when: false
      failed_when: false

    - name: Load ghostty terminfo
      ansible.builtin.command:
        cmd: "tic -x /home/{{ debian_dev_user }}/ghostty.terminfo"
      when: ghostty_check.rc != 0
      changed_when: true

    - name: Ensure dev's .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ debian_dev_user }}/.ssh"
        state: directory
        mode: "0700"

    - name: Generate GitHub SSH keypair for dev
      community.crypto.openssh_keypair:
        path: "/home/{{ debian_dev_user }}/.ssh/id_ed25519"
        type: ed25519
        comment: "{{ github_key_comment }}"

    - name: Read the GitHub public key
      ansible.builtin.slurp:
        src: "/home/{{ debian_dev_user }}/.ssh/id_ed25519.pub"
      register: github_pubkey

    - name: Show GitHub public key (add it at github.com/settings/keys)
      ansible.builtin.debug:
        msg: "{{ github_pubkey.content | b64decode }}"

    # These pnpm tasks run before chezmoi applies dotfiles and are invoked via
    # dev's fish login shell, so they must not depend on the ambient environment
    # (which may carry a stale/leaked PNPM_HOME). Each pins PNPM_HOME to the
    # Linux location. Persistent interactive PNPM_HOME is owned separately by
    # chezmoi (conf.d/path.fish); we don't write a dotfile. They run every play
    # (no install-once guard) so pnpm, Node LTS, and the global CLIs all track
    # the newest release.
    - name: Install/upgrade pnpm
      ansible.builtin.shell:
        cmd: |
          export PNPM_HOME="$HOME/.local/share/pnpm"
          curl -fsSL https://get.pnpm.io/install.sh | sh -
        executable: /bin/bash
      changed_when: true

    - name: Install/upgrade Node LTS via pnpm
      ansible.builtin.shell:
        cmd: |
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PNPM_HOME/bin:$PATH"
          pnpm env use --global lts
        executable: /bin/bash
      changed_when: true

    - name: Install/upgrade global pnpm CLIs to latest
      ansible.builtin.shell:
        cmd: |
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PNPM_HOME/bin:$PATH"
          pnpm add -g {{ item }}
        executable: /bin/bash
      loop:
        - tree-sitter-cli
        - "--allow-build=@anthropic-ai/claude-code @anthropic-ai/claude-code"
        - "@openai/codex"
        - playwright
      changed_when: true

    # Chromium won't launch on a minimal Debian without a stack of shared
    # libraries (libnss3, libgbm, libasound2, ...). Playwright knows its own
    # dependency list per distro, so let it drive apt 
    - name: Install Chromium system dependencies for Playwright
      become: true
      ansible.builtin.command:
        cmd: "{{ pnpm_bin }}/playwright install-deps chromium"
      environment:
        PATH: "{{ pnpm_bin }}:{{ ansible_facts['env']['PATH'] }}"
      changed_when: true

    - name: Install Chromium for Playwright
      ansible.builtin.command:
        cmd: "{{ pnpm_bin }}/playwright install chromium"
      environment:
        PATH: "{{ pnpm_bin }}:{{ ansible_facts['env']['PATH'] }}"
      changed_when: true

    - name: Write dev's global git config
      ansible.builtin.copy:
        dest: "/home/{{ debian_dev_user }}/.gitconfig"
        owner: "{{ debian_dev_user }}"
        group: "{{ debian_dev_user }}"
        mode: "0644"
        content: |
          [user]
          	name = {{ git_user_name }}
          	email = {{ git_user_email }}
          [init]
          	defaultBranch = {{ git_default_branch }}
          [core]
            editor = {{ git_default_editor }}

    - name: Add github.com to dev's known_hosts
      ansible.builtin.known_hosts:
        name: github.com
        key: "{{ lookup('ansible.builtin.pipe', 'ssh-keyscan -t ed25519 github.com') }}"
        path: "/home/{{ debian_dev_user }}/.ssh/known_hosts"

    # No creates: guard — the installer fetches the latest chezmoi each run so
    # the binary tracks upstream (dotfiles themselves are pulled separately
    # below via chezmoi update).
    - name: Install/upgrade chezmoi to /usr/local/bin
      become: true
      ansible.builtin.shell:
        cmd: "sh -c \"$(curl -fsLS get.chezmoi.io)\" -- -b /usr/local/bin"
      changed_when: true

    - name: Clone the dotfiles source with chezmoi (first run only)
      ansible.builtin.command:
        cmd: "chezmoi init {{ dotfiles_repo }}"
        # Check .git, not the source dir itself: a failed clone (e.g. the
        # deploy key not on GitHub yet) still leaves the empty source dir
        # behind, which previously made `creates` skip every re-run forever.
        creates: "/home/{{ debian_dev_user }}/.local/share/chezmoi/.git"

    # Pull the latest dotfiles on every run so changes roll out without a manual
    # `chezmoi update` on the VM.
    - name: Pull latest dotfiles with chezmoi
      ansible.builtin.command:
        cmd: "chezmoi update --apply=false"
      changed_when: true

    # Apply separately with --force. pnpm's installer appends a block to the
    # chezmoi-managed config.fish; without --force chezmoi tries to prompt about
    # that drift and dies on the TTY-less ansible connection. config.fish is
    # fully chezmoi-owned (path.fish provides PNPM_HOME), so discarding the
    # external edit is the correct outcome.
    - name: Apply dotfiles with chezmoi (force overwrites external drift)
      ansible.builtin.command:
        cmd: "chezmoi apply --force"
      changed_when: true

    - name: Remaining manual steps
      ansible.builtin.debug:
        msg:
          - "1. Add the SSH public key printed above to https://github.com/settings/keys"
          - "2. If the chezmoi step above failed because that key wasn't added to GitHub yet, add it and re-run provision.yml"
