---
- name: Bootstrap debian dev base setup (root via su)
  hosts: debian_dev
  become: true
  become_method: su
  gather_facts: true
  vars_prompt:
    - name: machine_ip
      prompt: "Machine IP address"
      private: false
    - name: ansible_become_password
      prompt: "ROOT password (for su)"
      private: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Full system upgrade (upgrade + full-upgrade)
      ansible.builtin.apt:
        upgrade: dist

    - name: Remove unused packages
      ansible.builtin.apt:
        autoremove: true

    - name: Clean apt cache
      ansible.builtin.apt:
        clean: true

    - name: Install sudo
      ansible.builtin.apt:
        name: sudo
        state: present

    - name: Add dev to the sudo group
      ansible.builtin.user:
        name: "{{ debian_dev_user }}"
        groups: sudo
        append: true

    - name: Install Mac public key in debian dev's authorized_keys
      ansible.posix.authorized_key:
        user: "{{ debian_dev_user }}"
        state: present
        key: "{{ lookup('ansible.builtin.file', mac_pubkey_path | expanduser) }}"

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?\s*PasswordAuthentication'
        line: 'PasswordAuthentication no'
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart ssh

  handlers:
    - name: Restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted
