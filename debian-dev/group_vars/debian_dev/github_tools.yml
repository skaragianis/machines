---
# CLI tools installed straight from their latest GitHub release by
# tasks/install_github_binary.yml. Release asset names are wildly inconsistent
# across projects, so each entry carries its own asset/subdir templates and an
# arch → release-target map. The `{version}` / `{target}` placeholders are
# expanded per-tool at run time by the task file (NOT Jinja `{{ }}` — this list
# is fed through a `loop`, which would eagerly template `{{ }}` before those
# facts exist, so single braces are used and substituted with `replace`).
# `subdir` is the path inside the extracted archive that contains the binaries
# ("" when they sit at the root); `bins` are the binaries under `subdir` to
# symlink into /usr/local/bin. `tag` pins a fixed rolling release (e.g. Neovim's
# "stable") instead of resolving the newest tag via the GitHub API.
github_release_tools:
  - name: neovim
    repo: neovim/neovim
    tag: stable
    target: { x86_64: x86_64, aarch64: arm64 }
    asset: "nvim-linux-{target}.tar.gz"
    subdir: "nvim-linux-{target}/bin"
    bins: [nvim]
  - name: yazi
    repo: sxyazi/yazi
    target: { x86_64: x86_64, aarch64: aarch64 }
    asset: "yazi-{target}-unknown-linux-gnu.zip"
    subdir: "yazi-{target}-unknown-linux-gnu"
    bins: [yazi, ya]
  - name: fzf
    repo: junegunn/fzf
    target: { x86_64: amd64, aarch64: arm64 }
    asset: "fzf-{version}-linux_{target}.tar.gz"
    subdir: ""
    bins: [fzf]
  - name: lazygit
    repo: jesseduffield/lazygit
    target: { x86_64: x86_64, aarch64: arm64 }
    asset: "lazygit_{version}_linux_{target}.tar.gz"
    subdir: ""
    bins: [lazygit]
  - name: ripgrep
    repo: BurntSushi/ripgrep
    target: { x86_64: x86_64-unknown-linux-musl, aarch64: aarch64-unknown-linux-gnu }
    asset: "ripgrep-{version}-{target}.tar.gz"
    subdir: "ripgrep-{version}-{target}"
    bins: [rg]
  - name: fd
    repo: sharkdp/fd
    target: { x86_64: x86_64-unknown-linux-gnu, aarch64: aarch64-unknown-linux-gnu }
    asset: "fd-v{version}-{target}.tar.gz"
    subdir: "fd-v{version}-{target}"
    bins: [fd]
  - name: zoxide
    repo: ajeetdsouza/zoxide
    target: { x86_64: x86_64-unknown-linux-musl, aarch64: aarch64-unknown-linux-musl }
    asset: "zoxide-{version}-{target}.tar.gz"
    subdir: ""
    bins: [zoxide]
  - name: jq
    repo: jqlang/jq
    archive: false
    target: { x86_64: amd64, aarch64: arm64 }
    asset: "jq-linux-{target}"
    subdir: ""
    bins: [jq]
  - name: hunk
    repo: modem-dev/hunk
    target: { x86_64: x64, aarch64: arm64 }
    asset: "hunkdiff-linux-{target}.tar.gz"
    subdir: "hunkdiff-linux-{target}"
    bins: [hunk]
  - name: delta
    repo: dandavison/delta
    target: { x86_64: x86_64-unknown-linux-gnu, aarch64: aarch64-unknown-linux-gnu }
    asset: "delta-{version}-{target}.tar.gz"
    subdir: "delta-{version}-{target}"
    bins: [delta]
  - name: difftastic
    repo: Wilfred/difftastic
    target: { x86_64: x86_64-unknown-linux-gnu, aarch64: aarch64-unknown-linux-gnu }
    asset: "difft-{target}.tar.gz"
    subdir: ""
    bins: [difft]
  - name: herdr
    repo: ogulcancelik/herdr
    archive: false
    target: { x86_64: x86_64, aarch64: aarch64 }
    asset: "herdr-linux-{target}"
    subdir: ""
    bins: [herdr]
  - name: pi
    repo: earendil-works/pi
    target: { x86_64: x64, aarch64: arm64 }
    asset: "pi-linux-{target}.tar.gz"
    subdir: "pi"
    bins: [pi]
